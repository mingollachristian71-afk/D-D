<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDR D&D Tribute</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="disclaimer-screen" class="screen">
        <h1>Benvenuti giocatori!</h1>
        <p>Il sito non supporta chat audio.</p>
        <button id="btnChiudiDisclaimer">OK, ho capito</button>
    </div>

    <div id="login-giocatore-screen" class="screen" style="display: none;">
        <h2>Unisciti alla partita</h2>
        <input type="text" id="inputNomeGiocatore" placeholder="Inserisci il tuo nome">
        <button id="btnEntraStanza">Entra in stanza</button>
    </div>

    <div id="home-screen" class="screen" style="display: none;">
        <h1>Menu Principale</h1>
        <div class="menu-section">
            <h3>Inizia nuova avventura</h3>
            <input type="text" id="nuovaAvventuraNome" placeholder="Nome avventura">
            <input type="number" id="numeroGiocatori" placeholder="Numero giocatori" min="2">
            <br>
            <button id="btnCreaAvventura">Inizia avventura</button>
        </div>
    </div>

    <div id="master-chat-screen" class="screen" style="display: none;">
        <h1>Chat del Master</h1>
        <textarea id="msgMaster" placeholder="Scrivi per i giocatori..."></textarea>
        <button id="btnInviaChat">Invia a tutti</button>
    </div>

    <div id="chat-box" style="display: none;"></div>

    <div id="creazione-personaggio-screen" class="screen" style="display: none;">
        <h1>Crea il tuo Personaggio</h1>
        <input type="text" id="nomePG" placeholder="Nome Personaggio">
        <textarea id="descrizionePG" placeholder="Descrizione Fisica"></textarea>
        <input type="text" id="obiettivoPG" placeholder="Obiettivo">
        <input type="text" id="classePG" placeholder="Classe">
        <input type="text" id="razzaPG" placeholder="Razza">

        <h3>Caratteristiche</h3>
        <div id="caratteristiche-container">
            <div>
                Forza: <select class="stat"><option value="">-</option><option>15</option><option>14</option><option>13</option><option>12</option><option>10</option><option>8</option></select><br>
                Costituzione: <select class="stat"><option value="">-</option><option>15</option><option>14</option><option>13</option><option>12</option><option>10</option><option>8</option></select><br>
                Destrezza: <select class="stat"><option value="">-</option><option>15</option><option>14</option><option>13</option><option>12</option><option>10</option><option>8</option></select>
            </div>
            <div>
                Intelligenza: <select class="stat"><option value="">-</option><option>15</option><option>14</option><option>13</option><option>12</option><option>10</option><option>8</option></select><br>
                Saggezza: <select class="stat"><option value="">-</option><option>15</option><option>14</option><option>13</option><option>12</option><option>10</option><option>8</option></select><br>
                Carisma: <select class="stat"><option value="">-</option><option>15</option><option>14</option><option>13</option><option>12</option><option>10</option><option>8</option></select>
            </div>
        </div>
        <button id="btnSalvaPG">Salva Personaggio</button>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
